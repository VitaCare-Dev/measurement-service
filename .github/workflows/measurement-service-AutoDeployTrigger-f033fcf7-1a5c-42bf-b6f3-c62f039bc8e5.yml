name: Trigger auto deployment for measurement-service

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/measurement-service-AutoDeployTrigger-f033fcf7-1a5c-42bf-b6f3-c62f039bc8e5.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.MEASUREMENTSERVICE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.MEASUREMENTSERVICE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.MEASUREMENTSERVICE_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: vitacareacr.azurecr.io
          registryUsername: ${{ secrets.MEASUREMENTSERVICE_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.MEASUREMENTSERVICE_REGISTRY_PASSWORD }}
          containerAppName: measurement-service
          resourceGroup: rg-vitacare
          imageToBuild: vitacareacr.azurecr.io/measurement-service:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


